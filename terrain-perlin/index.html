<!DOCTYPE html>
<html lang="en">
<head>
    <title>Three.js Perlin Terrain</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0d0f14; font-family: system-ui, sans-serif; }
        #ui {
            position: absolute; top: 16px; left: 16px; z-index: 10;
            background: #161a22; border: 1px solid #2a3142; border-radius: 10px;
            padding: 16px 20px; min-width: 240px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #ui h2 { font-size: 0.9rem; color: #7dd3c0; margin-bottom: 14px; font-weight: 600; }
        .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .row label { flex: 0 0 100px; font-size: 0.8rem; color: #8b92a8; }
        .row input[type="range"] { flex: 1; height: 6px; accent-color: #7dd3c0; }
        .row .val { width: 52px; font-size: 0.8rem; color: #e6e9f0; font-variant-numeric: tabular-nums; }
        .section-label { font-size: 0.7rem; color: #5ab8a8; text-transform: uppercase; letter-spacing: 0.05em; margin: 12px 0 6px; }
        .section-label:first-of-type { margin-top: 0; }
        .btn { width: 100%; margin-top: 12px; padding: 10px; cursor: pointer; border: none; border-radius: 8px;
            background: #7dd3c0; color: #0d0f14; font-weight: 600; font-size: 0.85rem; }
        .btn:hover { background: #5ab8a8; }
        .btn.secondary { background: #2a3142; color: #e6e9f0; margin-top: 6px; }
        .btn.secondary:hover { background: #353d52; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Terrain params</h2>
        <div class="section-label">Warp noise (domain distortion)</div>
        <div class="row"><label>Warp scale</label><input type="range" id="warpScale" min="0.01" max="0.2" step="0.005" value="0.05" /><span class="val" id="warpScaleVal">0.05</span></div>
        <div class="row"><label>Warp strength</label><input type="range" id="warpStrength" min="0" max="30" step="0.5" value="8" /><span class="val" id="warpStrengthVal">8</span></div>
        <div class="row"><label>Warp seed</label><input type="range" id="warpSeed" min="0" max="100" step="1" value="0" /><span class="val" id="warpSeedVal">0</span></div>
        <div class="section-label">Height noise (elevation)</div>
        <div class="row"><label>Height scale</label><input type="range" id="heightScale" min="0.01" max="0.2" step="0.005" value="0.05" /><span class="val" id="heightScaleVal">0.05</span></div>
        <div class="row"><label>Height amp</label><input type="range" id="heightAmp" min="1" max="30" step="0.5" value="10" /><span class="val" id="heightAmpVal">10</span></div>
        <div class="row"><label>Height seed</label><input type="range" id="heightSeed" min="0" max="100" step="1" value="5" /><span class="val" id="heightSeedVal">5</span></div>
        <div class="section-label">Grid</div>
        <div class="row"><label>Size</label><input type="range" id="size" min="40" max="200" step="10" value="100" /><span class="val" id="sizeVal">100</span></div>
        <div class="row"><label>Segments</label><input type="range" id="segments" min="32" max="192" step="16" value="128" /><span class="val" id="segmentsVal">128</span></div>
        <div class="row"><label>Relief thickness</label><input type="range" id="baseThickness" min="1" max="15" step="0.5" value="4" /><span class="val" id="baseThicknessVal">4</span></div>
        <button class="btn" id="regenerate">Regenerate</button>
        <button class="btn secondary" id="export-obj">Download .OBJ</button>
        <button class="btn secondary" id="export-stl">Download .STL (for Prusa)</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJExporter } from 'three/addons/exporters/OBJExporter.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import { SimplexNoise } from 'three/addons/math/SimplexNoise.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const simplex = new SimplexNoise();

        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        let terrain = null;
        let geometry = null;
        let material = null;

        function getParams() {
            return {
                warpScale: Number(document.getElementById('warpScale').value),
                warpStrength: Number(document.getElementById('warpStrength').value),
                warpSeed: Number(document.getElementById('warpSeed').value),
                heightScale: Number(document.getElementById('heightScale').value),
                heightAmp: Number(document.getElementById('heightAmp').value),
                heightSeed: Number(document.getElementById('heightSeed').value),
                size: Number(document.getElementById('size').value),
                segments: Number(document.getElementById('segments').value),
                baseThickness: Number(document.getElementById('baseThickness').value),
            };
        }

        function applyNoise(position) {
            const p = getParams();
            const { warpScale, warpStrength, warpSeed, heightScale, heightAmp, heightSeed } = p;
            for (let i = 0; i < position.count; i++) {
                const x = position.getX(i);
                const z = position.getZ(i);
                const ox = warpStrength * simplex.noise3d(x * warpScale, z * warpScale, warpSeed);
                const oz = warpStrength * simplex.noise3d(x * warpScale + 5.2, z * warpScale + 10.3, warpSeed + 100);
                const h = heightAmp * simplex.noise3d((x + ox) * heightScale, (z + oz) * heightScale, heightSeed);
                position.setY(i, h);
            }
            position.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        function buildTerrain() {
            if (terrain) {
                scene.remove(terrain);
                if (geometry) geometry.dispose();
                if (material) material.dispose();
            }
            const { size, segments } = getParams();
            geometry = new THREE.PlaneGeometry(size, size, segments, segments);
            geometry.rotateX(-Math.PI / 2);
            material = new THREE.MeshStandardMaterial({
                color: 0x3366ff,
                wireframe: false,
                flatShading: false,
            });
            terrain = new THREE.Mesh(geometry, material);
            scene.add(terrain);
            applyNoise(geometry.attributes.position);
        }

        function updateFromParams() {
            if (!geometry) return;
            applyNoise(geometry.attributes.position);
        }

        const noiseParamIds = ['warpScale', 'warpStrength', 'warpSeed', 'heightScale', 'heightAmp', 'heightSeed'];
        const gridParamIds = ['size', 'segments'];
        const allParamIds = [...noiseParamIds, ...gridParamIds, 'baseThickness'];

        function syncLabels() {
            allParamIds.forEach(id => {
                const el = document.getElementById(id);
                const val = document.getElementById(id + 'Val');
                if (!el || !val) return;
                if (id === 'warpScale' || id === 'heightScale') val.textContent = Number(el.value).toFixed(3);
                else if (id === 'warpStrength' || id === 'heightAmp' || id === 'baseThickness') val.textContent = Number(el.value).toFixed(1);
                else val.textContent = el.value;
            });
        }

        function buildPrintableMesh() {
            if (!terrain) return null;
            terrain.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(terrain);
            const minY = box.min.y;
            const segs = Number(document.getElementById('segments').value);
            const cols = segs + 1, rows = segs + 1;
            const baseThickness = Math.max(0.5, Number(document.getElementById('baseThickness').value));

            const terrainClone = terrain.clone();
            terrainClone.position.set(0, -minY + baseThickness, 0);  // sit on a base of height baseThickness
            terrainClone.updateMatrixWorld(true);

            const terrainGeo = terrainClone.geometry.clone();
            terrainGeo.applyMatrix4(terrainClone.matrixWorld);

            const pos = terrainGeo.attributes.position;
            const N = pos.count;

            // Solid block: top = terrain surface, bottom = flat plane at y=0. No overhangs; everything supported.
            const totalVerts = N * 2;
            const positions = new Float32Array(totalVerts * 3);
            const uvs = new Float32Array(totalVerts * 2);
            for (let i = 0; i < N; i++) {
                positions[i * 3] = pos.getX(i);
                positions[i * 3 + 1] = pos.getY(i);
                positions[i * 3 + 2] = pos.getZ(i);
                positions[(N + i) * 3] = pos.getX(i);
                positions[(N + i) * 3 + 1] = 0;  // flat base so nothing floats
                positions[(N + i) * 3 + 2] = pos.getZ(i);
            }
            if (terrainGeo.attributes.uv) {
                const uv = terrainGeo.attributes.uv;
                for (let i = 0; i < N; i++) {
                    uvs[i * 2] = uv.getX(i);
                    uvs[i * 2 + 1] = uv.getY(i);
                    uvs[(N + i) * 2] = uv.getX(i);
                    uvs[(N + i) * 2 + 1] = uv.getY(i);
                }
            }

            const boundaryIndices = [];
            for (let i = 0; i < cols; i++) boundaryIndices.push(i);
            for (let j = 1; j < rows; j++) boundaryIndices.push(j * cols + (cols - 1));
            for (let i = cols - 2; i >= 0; i--) boundaryIndices.push((rows - 1) * cols + i);
            for (let j = rows - 2; j >= 1; j--) boundaryIndices.push(j * cols);
            const n = boundaryIndices.length;

            const terrainIndex = terrainGeo.index;
            const indices = [];
            if (terrainIndex) {
                for (let i = 0; i < terrainIndex.count; i++) indices.push(terrainIndex.getX(i));
                for (let i = 0; i < terrainIndex.count; i += 3) {
                    const a = terrainIndex.getX(i), b = terrainIndex.getX(i + 1), c = terrainIndex.getX(i + 2);
                    indices.push(N + a, N + c, N + b);
                }
            } else {
                for (let i = 0; i < N; i += 3) indices.push(i, i + 1, i + 2);
                for (let i = 0; i < N; i += 3) indices.push(N + i, N + i + 2, N + i + 1);
            }
            for (let i = 0; i < n; i++) {
                const topA = boundaryIndices[i], topB = boundaryIndices[(i + 1) % n];
                const botA = N + topA, botB = N + topB;
                indices.push(topA, botA, topB);
                indices.push(topB, botA, botB);
            }

            const singleGeo = new THREE.BufferGeometry();
            singleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            singleGeo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
            singleGeo.setIndex(indices);
            singleGeo.computeVertexNormals();

            let minBy = Infinity;
            for (let i = 0; i < totalVerts; i++) {
                const y = positions[i * 3 + 1];
                if (y < minBy) minBy = y;
            }
            singleGeo.applyMatrix4(new THREE.Matrix4().makeTranslation(0, -minBy, 0));

            const printMesh = new THREE.Mesh(singleGeo, new THREE.MeshStandardMaterial({ color: 0x3366ff }));
            printMesh.name = 'terrain_print';
            return printMesh;
        }

        noiseParamIds.forEach(id => {
            document.getElementById(id).addEventListener('input', () => { syncLabels(); updateFromParams(); });
        });
        gridParamIds.forEach(id => {
            document.getElementById(id).addEventListener('input', () => { syncLabels(); buildTerrain(); });
        });
        document.getElementById('baseThickness').addEventListener('input', syncLabels);

        document.getElementById('regenerate').addEventListener('click', () => { buildTerrain(); syncLabels(); });
        syncLabels();
        buildTerrain();

        function exportMesh(format) {
            const printMesh = buildPrintableMesh();
            if (!printMesh) return;
            let blob, filename;
            if (format === 'stl') {
                const exporter = new STLExporter();
                const result = exporter.parse(printMesh, { binary: true });
                blob = new Blob([result], { type: 'application/octet-stream' });
                filename = 'terrain-3dprint.stl';
            } else {
                const exporter = new OBJExporter();
                const result = exporter.parse(printMesh);
                blob = new Blob([result], { type: 'text/plain' });
                filename = 'terrain-3dprint.obj';
            }
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
            if (printMesh.geometry) printMesh.geometry.dispose();
            if (printMesh.material) printMesh.material.dispose();
        }

        document.getElementById('export-obj').addEventListener('click', () => exportMesh('obj'));
        document.getElementById('export-stl').addEventListener('click', () => exportMesh('stl'));

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
